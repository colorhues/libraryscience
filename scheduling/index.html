<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script>
    // Pre-paint: read language preference (set by any toggle across the site)
    // before the page paints, so the title, meta description, and visible
    // copy all render in the right language on first paint. Same localStorage
    // key as the homepage and the MARC tool.
    (function () {
      var TITLES = {
        en: "Schedule a visit · libraryscience.ai",
        es: "Programa una visita · libraryscience.ai"
      };
      var DESCS = {
        en: "Chat with Bibi to schedule a volunteer visit to the Los Robles library.",
        es: "Platica con Bibi para programar una visita voluntaria a la biblioteca Los Robles."
      };
      try {
        var stored = localStorage.getItem("lsai.lang");
        var lang = stored
          || ((navigator.language || "en").toLowerCase().indexOf("es") === 0 ? "es" : "en");
        if (lang !== "en" && lang !== "es") lang = "en";
        document.documentElement.setAttribute("data-lang", lang);
        document.documentElement.setAttribute("lang", lang);
        document.title = TITLES[lang];
        // Defer meta description update until <head> is parsed enough to find it
        document.addEventListener("DOMContentLoaded", function () {
          var m = document.querySelector('meta[name="description"]');
          if (m) m.setAttribute("content", DESCS[lang]);
        });
      } catch (e) {
        document.documentElement.setAttribute("data-lang", "en");
      }
    })();
  </script>
  <title>Schedule a visit · libraryscience.ai</title>
  <meta name="description" content="Chat with Bibi to schedule a volunteer visit to the Los Robles library.">
  <style>
    :root {
      --ink: #1F1B16;
      --muted: #5A544D;
      --cream: #FBF8F2;
      --parchment: #F4EFE4;
      --hairline: #D8D2C5;
      --green: #2F4F3E;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background:
        linear-gradient(180deg, #C9DCE8 0%, #E7EEF2 35%, #FBF8F2 100%) no-repeat;
      min-height: 100vh;
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
    }
    .page {
      max-width: 720px;
      margin: 0 auto;
      padding: 56px 24px 96px;
    }
    .top-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .back {
      font-family: "JetBrains Mono", "SF Mono", Menlo, Consolas, monospace;
      font-size: 12px;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: 0.04em;
    }
    .back:hover { color: var(--ink); }
    .lang-toggle {
      display: inline-flex;
      align-items: center;
      gap: 2px;
      padding: 2px 4px;
      border: 1px solid var(--hairline);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.4);
    }
    .lang-toggle button {
      background: none;
      border: none;
      padding: 4px 9px;
      font-family: "JetBrains Mono", "SF Mono", Menlo, Consolas, monospace;
      font-size: 11px;
      letter-spacing: 0.08em;
      color: var(--muted);
      cursor: pointer;
      border-radius: 999px;
      transition: color 0.12s ease, background 0.12s ease;
    }
    .lang-toggle button:hover { color: var(--ink); }
    .lang-toggle button.active {
      color: var(--green);
      background: var(--cream);
    }
    .hero {
      margin: 28px 0 32px;
    }
    .hero .eyebrow {
      font-family: "JetBrains Mono", "SF Mono", Menlo, Consolas, monospace;
      font-size: 11px;
      letter-spacing: 0.12em;
      color: var(--green);
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .hero h1 {
      font-size: 36px;
      line-height: 1.15;
      margin: 0 0 12px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }
    .hero p {
      font-size: 16px;
      line-height: 1.55;
      color: var(--muted);
      margin: 0;
      max-width: 540px;
    }
    #bibi-full {
      margin-top: 24px;
      box-shadow: 0 12px 32px rgba(31, 27, 22, 0.08);
    }
    @media (max-width: 640px) {
      .page { padding: 32px 16px 64px; }
      .hero h1 { font-size: 28px; }
    }
  </style>
</head>
<body data-bibi-no-strip>
  <div class="page">
    <div class="top-row">
      <a class="back" href="/">← libraryscience.ai</a>
      <div class="lang-toggle" role="group" aria-label="Language">
        <button id="lang-en" type="button">EN</button>
        <button id="lang-es" type="button">ES</button>
      </div>
    </div>
    <div class="hero">
      <div class="eyebrow" data-i18n="eyebrow">027.8 · Volunteer scheduling</div>
      <h1 data-i18n="h1">Find a time to help out at the library.</h1>
      <p data-i18n="body">Chat with Bibi to pick what you'd like to do — read to kids, scan books, sort and label, or help plan an author visit — and a time that works. She'll send you a calendar invite with the details.</p>
    </div>
    <div id="bibi-full"></div>
  </div>

  <script src="/bibi.js" defer></script>
  <script>
    (function () {
      "use strict";

      var I18N = {
        en: {
          "title":   "Schedule a visit · libraryscience.ai",
          "desc":    "Chat with Bibi to schedule a volunteer visit to the Los Robles library.",
          "eyebrow": "027.8 · Volunteer scheduling",
          "h1":      "Find a time to help out at the library.",
          "body":    "Chat with Bibi to pick what you'd like to do — read to kids, scan books, sort and label, or help plan an author visit — and a time that works. She'll send you a calendar invite with the details."
        },
        es: {
          "title":   "Programa una visita · libraryscience.ai",
          "desc":    "Platica con Bibi para programar una visita voluntaria a la biblioteca Los Robles.",
          "eyebrow": "027.8 · Programación de voluntarios",
          "h1":      "Encuentra un horario para ayudar en la biblioteca.",
          "body":    "Platica con Bibi para escoger qué te gustaría hacer — leerles a los niños, escanear libros, ordenar y etiquetar, o ayudar a planear una visita de autor — y un horario que te acomode. Ella te mandará una invitación al calendario con los detalles."
        }
      };

      function getLang() {
        var l = (document.documentElement.getAttribute("data-lang") || "en").toLowerCase();
        return l === "es" ? "es" : "en";
      }

      function setLang(next) {
        next = (next === "es") ? "es" : "en";
        try { localStorage.setItem("lsai.lang", next); } catch (_) {}
        document.documentElement.setAttribute("data-lang", next);
        document.documentElement.setAttribute("lang", next);
      }

      function t(key) {
        var lang = getLang();
        return (I18N[lang] && I18N[lang][key]) || I18N.en[key] || key;
      }

      function applyTranslations() {
        // Visible body content
        document.querySelectorAll("[data-i18n]").forEach(function (el) {
          el.textContent = t(el.getAttribute("data-i18n"));
        });
        // Document title + meta description
        document.title = t("title");
        var meta = document.querySelector('meta[name="description"]');
        if (meta) meta.setAttribute("content", t("desc"));
      }

      function updateToggleUI() {
        var lang = getLang();
        var en = document.getElementById("lang-en");
        var es = document.getElementById("lang-es");
        if (en) en.classList.toggle("active", lang === "en");
        if (es) es.classList.toggle("active", lang === "es");
      }

      // Wire up the toggle buttons
      var btnEn = document.getElementById("lang-en");
      var btnEs = document.getElementById("lang-es");
      if (btnEn) btnEn.addEventListener("click", function () { setLang("en"); });
      if (btnEs) btnEs.addEventListener("click", function () { setLang("es"); });

      // Watch for any data-lang change (from this toggle or from bibi.js
      // or from another tab via storage events) and refresh.
      try {
        var obs = new MutationObserver(function () {
          applyTranslations();
          updateToggleUI();
        });
        obs.observe(document.documentElement, { attributes: true, attributeFilter: ["data-lang", "lang"] });
      } catch (e) { console.warn("[i18n]", e); }

      // Cross-tab sync: if the user toggles lang in another tab, follow.
      window.addEventListener("storage", function (e) {
        if (e.key === "lsai.lang" && (e.newValue === "en" || e.newValue === "es")) {
          if (e.newValue !== getLang()) {
            document.documentElement.setAttribute("data-lang", e.newValue);
            document.documentElement.setAttribute("lang", e.newValue);
          }
        }
      });

      // Initial paint
      applyTranslations();
      updateToggleUI();
    })();

    document.addEventListener("DOMContentLoaded", function () {
      window.Bibi.mountFull(document.getElementById("bibi-full"));
    });
  </script>
</body>
</html>
